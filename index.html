<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agroforte Pneus e Rodas</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; color: #333; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; background: #34495e; padding: 10px 0; }
        .nav-tabs button { background: none; border: none; color: white; font-size: 16px; margin: 0 15px; cursor: pointer; padding: 10px; opacity: 0.7; }
        .nav-tabs button.ativo { opacity: 1; border-bottom: 3px solid #f1c40f; font-weight: bold; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Formulário Admin */
        .form-admin { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .form-admin input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 150px; }
        .form-admin button { padding: 10px 15px; background: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .form-admin button.btn-cancelar { background: #95a5a6; }
        
        /* Tabela Admin */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f2f2f2; }
        .img-miniatura { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-editar { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-excluir { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        /* Catálogo Cliente */
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; text-align: center; background: #fff; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #f9f9f9; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.2em; color: #2c3e50; }
        .preco { font-size: 1.5em; color: #27ae60; font-weight: bold; margin: 10px 0; }
        .estoque { color: #7f8c8d; font-size: 0.9em; margin-bottom: 15px; }
        .btn-comprar { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; margin-top: auto; }
        .btn-comprar:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Estilos do Chatbot */
        .chat-container { border: 1px solid #ddd; background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .chat-box { height: 250px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .msg-user { background: #2980b9; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .msg-bot { background: #ecf0f1; color: #333; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 80%; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 0; }
        .chat-input-area button { background: #8e44ad; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .chat-input-area button:disabled { background: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            // Estados Gerais
            const [abaAtual, setAbaAtual] = React.useState('cliente');
            const [pneus, setPneus] = React.useState([]);
            const [editandoId, setEditandoId] = React.useState(null);
            const [form, setForm] = React.useState({ marca: '', modelo: '', medida: '', preco: '', estoque: '', imagem: '' });
            
            // Estados do Chatbot
            const [mensagens, setMensagens] = React.useState([{ remetente: 'bot', texto: 'Olá! Qual o modelo da sua colheitadeira ou trator? Vou te ajudar a achar o pneu ideal.' }]);
            const [inputChat, setInputChat] = React.useState('');
            const [carregandoIA, setCarregandoIA] = React.useState(false);

            React.useEffect(() => {
                carregarPneus();
            }, []);

            // --- Funções de Catálogo e Estoque ---
            const carregarPneus = () => {
                fetch('http://localhost:3000/api/pneus')
                    .then(res => res.json())
                    .then(data => setPneus(data));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const url = editandoId ? `http://localhost:3000/api/pneus/${editandoId}` : 'http://localhost:3000/api/pneus';
                const method = editandoId ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(form)
                }).then(res => res.json()).then(data => {
                    if(data.success) {
                        carregarPneus();
                        limparForm();
                    }
                });
            };

            const editarPneu = (pneu) => {
                setForm(pneu);
                setEditandoId(pneu.id);
            };

            const excluirPneu = (id) => {
                if(confirm('Tem certeza que deseja excluir este pneu?')) {
                    fetch(`http://localhost:3000/api/pneus/${id}`, { method: 'DELETE' })
                        .then(res => res.json())
                        .then(() => carregarPneus());
                }
            };

            const limparForm = () => {
                setForm({ marca: '', modelo: '', medida: '', preco: '', estoque: '', imagem: '' });
                setEditandoId(null);
            };

            const fazerPedido = (id, marca, modelo) => {
                fetch('http://localhost:3000/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pneuId: id, quantidade: 1 })
                }).then(res => res.json()).then(data => {
                    if(data.success) {
                        alert(`Venda confirmada! 1x ${marca} ${modelo} retirado do estoque.`);
                        carregarPneus();
                    } else {
                        alert(`Erro: ${data.message}`);
                    }
                });
            };

            // --- Função do Chatbot ---
            const enviarMensagemChat = (e) => {
                e.preventDefault();
                if (!inputChat.trim()) return;

                const novaMensagemUsuario = { remetente: 'user', texto: inputChat };
                setMensagens(prev => [...prev, novaMensagemUsuario]);
                setInputChat('');
                setCarregandoIA(true);

                fetch('http://localhost:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagemUsuario: novaMensagemUsuario.texto })
                })
                .then(res => res.json())
                .then(data => {
                    setMensagens(prev => [...prev, { remetente: 'bot', texto: data.resposta }]);
                })
                .catch(() => {
                    setMensagens(prev => [...prev, { remetente: 'bot', texto: 'Desculpe, deu um erro ao consultar o sistema.' }]);
                })
                .finally(() => setCarregandoIA(false));
            };

            return (
                <div>
                    <header>
                        <h1>Agroforte Pneus e Rodas</h1>
                        <p>Catálogo Digital e Inteligência Artificial</p>
                    </header>
                    
                    <div className="nav-tabs">
                        <button className={abaAtual === 'cliente' ? 'ativo' : ''} onClick={() => setAbaAtual('cliente')}>Visão do Cliente</button>
                        <button className={abaAtual === 'admin' ? 'ativo' : ''} onClick={() => setAbaAtual('admin')}>Painel Administrador</button>
                    </div>

                    <div className="container">
                        {abaAtual === 'admin' && (
                            <div>
                                <h2>{editandoId ? 'Editar Pneu' : 'Adicionar Novo Pneu'}</h2>
                                <form className="form-admin" onSubmit={handleSubmit}>
                                    <input type="text" placeholder="Marca (Ex: Michelin)" value={form.marca} onChange={e => setForm({...form, marca: e.target.value})} required />
                                    <input type="text" placeholder="Modelo (Ex: CerexBib)" value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} required />
                                    <input type="text" placeholder="Medida (Ex: 800/65R32)" value={form.medida} onChange={e => setForm({...form, medida: e.target.value})} required />
                                    <input type="number" step="0.01" placeholder="Preço (R$)" value={form.preco} onChange={e => setForm({...form, preco: e.target.value})} required />
                                    <input type="number" placeholder="Estoque" value={form.estoque} onChange={e => setForm({...form, estoque: e.target.value})} required />
                                    <input type="url" placeholder="Link da Foto (URL)" value={form.imagem} onChange={e => setForm({...form, imagem: e.target.value})} />
                                    
                                    <button type="submit">{editandoId ? 'Salvar Alterações' : 'Cadastrar Pneu'}</button>
                                    {editandoId && <button type="button" className="btn-cancelar" onClick={limparForm}>Cancelar</button>}
                                </form>

                                <h2>Estoque Atual</h2>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Foto</th>
                                            <th>Produto</th>
                                            <th>Medida</th>
                                            <th>Preço</th>
                                            <th>Estoque</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {pneus.map(p => (
                                            <tr key={p.id}>
                                                <td>{p.imagem ? <img src={p.imagem} className="img-miniatura" alt="Pneu" /> : 'Sem Foto'}</td>
                                                <td>{p.marca} {p.modelo}</td>
                                                <td>{p.medida}</td>
                                                <td>R$ {p.preco.toFixed(2)}</td>
                                                <td>{p.estoque} un.</td>
                                                <td>
                                                    <button className="btn-editar" onClick={() => editarPneu(p)}>Editar</button>
                                                    <button className="btn-excluir" onClick={() => excluirPneu(p.id)}>Excluir</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {abaAtual === 'cliente' && (
                            <div>
                                <h2>Pneus Disponíveis</h2>
                                <div className="catalogo">
                                    {pneus.length === 0 ? <p>Nenhum produto disponível no momento.</p> : null}
                                    
                                    {pneus.map(p => (
                                        <div key={p.id} className="card">
                                            <img src={p.imagem || 'https://via.placeholder.com/250x200?text=Sem+Imagem'} alt={`${p.marca} ${p.modelo}`} />
                                            <div className="card-body">
                                                <h3>{p.marca} {p.modelo}</h3>
                                                <p>Medida: <strong>{p.medida}</strong></p>
                                                <p className="preco">R$ {p.preco.toFixed(2)}</p>
                                                <p className="estoque">{p.estoque > 0 ? `${p.estoque} em estoque` : 'Esgotado'}</p>
                                                <button 
                                                    className="btn-comprar"
                                                    onClick={() => fazerPedido(p.id, p.marca, p.modelo)} 
                                                    disabled={p.estoque <= 0}>
                                                    {p.estoque > 0 ? 'Fazer Pedido' : 'Indisponível'}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Seção do Chatbot IA */}
                                <div className="chat-container">
                                    <h2>Assistente Inteligente (IA)</h2>
                                    <p style={{fontSize: '0.9em', color: '#7f8c8d'}}>Não sabe a medida? Digite o modelo da máquina e eu encontro no nosso estoque.</p>
                                    
                                    <div className="chat-box">
                                        {mensagens.map((msg, index) => (
                                            <div key={index} className={msg.remetente === 'user' ? 'msg-user' : 'msg-bot'}>
                                                <strong>{msg.remetente === 'user' ? 'Você: ' : 'Agroforte: '}</strong>
                                                {msg.texto}
                                            </div>
                                        ))}
                                        {carregandoIA && <div className="msg-bot"><em>Analisando o estoque...</em></div>}
                                    </div>

                                    <form className="chat-input-area" onSubmit={enviarMensagemChat}>
                                        <input 
                                            type="text" 
                                            placeholder="Ex: Pneu para Colheitadeira S760..." 
                                            value={inputChat} 
                                            onChange={e => setInputChat(e.target.value)} 
                                            disabled={carregandoIA}
                                        />
                                        <button type="submit" disabled={carregandoIA}>Enviar</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
